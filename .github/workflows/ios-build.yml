name: iOS Build sin firmar

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Descargar dependencias
        run: flutter pub get

      - name: Compilar iOS sin firmar
        run: flutter build ios --release --no-codesign

      - name: Empaquetar en .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r app-sin-firmar.ipa Payload

      - name: Subir el .ipa como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-sin-firmar
          path: build/ios/iphoneos/app-sin-firmar.ipa
